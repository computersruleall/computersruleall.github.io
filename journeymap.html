<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journey Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: white;
    }


    header {
      background: #333;
      padding: 10px 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }


    header a {
      text-decoration: none;
    }


    header button {
      background: #4da6ff;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }


    header button:hover {
      background: #2f89e0;
    }


    #map {
      width: 1200px;
      height: 600px;
      border: 1px solid black;
      margin: 15px auto;
      position: relative;
    }


    .leaflet-control-attribution {
      display: none !important;
    }



    #routeMenu {

      position: absolute;

      bottom: 10px;

      right: 10px;


      background: rgba(255,255,255,0.9);

      padding: 10px;

      border-radius: 6px;

      z-index: 1000;


      display: flex;

      flex-direction: column;


      max-height: 350px;

      overflow-y: auto;


      font-size: 14px;

    }




    #routeMenu label {

      margin-bottom: 6px;

      cursor: pointer;

      user-select: none;

      white-space: nowrap;

    }




    #routeMenu span {

      cursor: pointer;

      color: #0056b3;

    }



    #routeMenu span:hover {

      color: #003d80;

      text-decoration: underline;

    }




    .playButton {

      margin-left: 8px;

      cursor: pointer;

      color: #008000;

      font-weight: bold;

    }




    .playButton:hover {

      color: #004d00;

      text-decoration: underline;

    }


  </style>

</head>


<body>



<header>

  <a href="index.html"><button>Home</button></a>

  <a href="matsuya.html"><button>Matsuya</button></a>

  <a href="concerts.html"><button>Concerts</button></a>

  <a href="routes.html"><button>JourneyMap</button></a>

</header>




<div id="map">


  <div id="routeMenu"></div>


</div>





<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>





<script>



const map = L.map('map').setView(

  [36.2048,138.2529],

  5

);





L.tileLayer(

'https://{s}.tile.thunderforest.com/neighbourhood/{z}/{x}/{y}.png?apikey=db5ae1f5778a448ca662554581f283c5',

{

 attribution:'&copy; OpenStreetMap contributors &copy; Thunderforest'

}

).addTo(map);





// GPX ROUTES


const routes = [


{

 name:"Tsurumi",

 file:"tsurumi.gpx",

 color:"#ff0000"

},


{

 name:"Kamakura",

 file:"gpx/kamakura.gpx",

 color:"#009900"

},


{

 name:"Lake Suwa",

 file:"gpx/lake-suwa.gpx",

 color:"#0066ff"

}


];





const routeMenu =

document.getElementById("routeMenu");





// Animation speed control


const speedLabel = document.createElement("label");


speedLabel.innerHTML = `

  Play Route in:

  <input

    id="animationSpeed"

    type="number"

    value="10"

    min="1"

    max="300"

    style="width:50px;"

  >

  Seconds

`;





const routeObjects = [];





L.DomEvent.disableClickPropagation(routeMenu);

L.DomEvent.disableScrollPropagation(routeMenu);
// Load each GPX route

routes.forEach((route, index) => {


  const routeData = {

    layer: null,

    animationLayer: null,

    animationFrame: null,

    coordinates: [],

    visible: true,

    playing: false

  };


  routeObjects.push(routeData);





  const layer = new L.GPX(route.file, {


    async: true,


    polyline_options: {


      color: route.color,

      weight: 4,

      opacity: 0.9


    },


    marker_options: {


      startIconUrl: null,

      endIconUrl: null,

      shadowUrl: null


    }


  });





  routeData.layer = layer;




  // Tooltip for original route

  layer.bindTooltip(route.name, {

    sticky: true,

    direction: "top"

  });





  layer.addTo(map);







  // Create route menu item


  const label = document.createElement("label");





  const checkbox = document.createElement("input");


  checkbox.type = "checkbox";


  checkbox.checked = true;





  const text = document.createElement("span");


  text.textContent = " " + route.name;





  const play = document.createElement("span");


  play.className = "playButton";


  play.textContent = " [Play]";





  label.appendChild(checkbox);


  label.appendChild(text);


  label.appendChild(play);





  routeMenu.appendChild(label);







  // Clicking route name zooms to route


  text.addEventListener("click",(e)=>{


    e.stopPropagation();



    if(layer.getBounds().isValid()){


      map.fitBounds(

        layer.getBounds(),

        {

          padding:[40,40]

        }

      );


    }


  });








  // Prevent checkbox click from affecting map


  checkbox.addEventListener("click",(e)=>{


    e.stopPropagation();


  });







  // Show / hide original route


  checkbox.addEventListener("change",()=>{



    if(checkbox.checked){



      layer.addTo(map);



      routeData.visible = true;



    }

    else{



      map.removeLayer(layer);



      routeData.visible = false;





      // Stop animation if running


      if(routeData.animationFrame){


        cancelAnimationFrame(routeData.animationFrame);


        routeData.animationFrame = null;


      }




      // Remove animation line


      if(routeData.animationLayer){


        map.removeLayer(routeData.animationLayer);


        routeData.animationLayer = null;


      }



      routeData.playing = false;



    }


  });








  // Load GPX coordinates


  layer.on("loaded",(e)=>{



    routeData.coordinates =

      e.target.getLayers()[0]
      .getLatLngs();





    if(index === 0){


      map.fitBounds(

        e.target.getBounds(),

        {

          padding:[40,40]

        }

      );


    }


  });








  // Play button


  play.addEventListener("click",(e)=>{



    e.preventDefault();


    e.stopPropagation();





    if(routeData.coordinates.length === 0){


      alert("Route is still loading.");


      return;


    }






    // If unchecked, enable checkbox


    if(!checkbox.checked){


      checkbox.checked = true;


      routeData.visible = true;


    }






    // Hide original route while animation plays


    if(map.hasLayer(layer)){


      map.removeLayer(layer);


    }






    animateRoute(routeData, route);



  });


});
// Add animation speed control underneath routes

routeMenu.appendChild(speedLabel);



const speedInput = document.getElementById("animationSpeed");



speedInput.addEventListener("input",()=>{


  if(speedInput.value < 1){

    speedInput.value = 1;

  }


  if(speedInput.value > 300){

    speedInput.value = 300;

  }


  speedInput.value = Math.floor(speedInput.value);


});






// Animate route from start to finish

function animateRoute(routeData, route){



  // Remove previous animation

  if(routeData.animationLayer){


    map.removeLayer(routeData.animationLayer);


    routeData.animationLayer = null;


  }



  if(routeData.animationFrame){


    cancelAnimationFrame(routeData.animationFrame);


    routeData.animationFrame = null;


  }






  routeData.playing = true;






  const animatedLine = L.polyline(

    [],

    {

      color: route.color,

      weight: 6,

      opacity: 1

    }

  ).addTo(map);






  animatedLine.bindTooltip(route.name, {

    sticky: true,

    direction: "top"

  });






  routeData.animationLayer = animatedLine;






  const points = routeData.coordinates;



  let startTime = null;





  const duration =

    Number(document.getElementById("animationSpeed").value) * 1000;








  function animate(timestamp){



    if(!startTime){


      startTime = timestamp;


    }






    const elapsed =

      timestamp - startTime;






    const progress =

      Math.min(

        elapsed / duration,

        1

      );







    const currentIndex =

      Math.floor(

        progress * (points.length - 1)

      );






    animatedLine.setLatLngs(

      points.slice(

        0,

        currentIndex + 1

      )

    );








    if(progress < 1){



      routeData.animationFrame =

        requestAnimationFrame(animate);



    }

    else{



      routeData.playing = false;


      routeData.animationFrame = null;



    }


  }







  // Start from beginning


  animatedLine.setLatLngs([]);




  routeData.animationFrame =

    requestAnimationFrame(animate);



}







// Prevent menu interactions from moving map

routeMenu.addEventListener(

  "mousedown",

  function(e){


    e.stopPropagation();


  }

);



</script>


</body>

</html>
