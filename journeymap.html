<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JourneyMap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  overflow-x: hidden;
}

body {
  font-family: Arial, sans-serif;
  background: white;
}

header {
  width: 100%;
  box-sizing: border-box;
  background: #333;
  padding: 10px 20px;
  display: flex;
  gap: 10px;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
}

header a {
  text-decoration: none;
}

header button {
  background: #4da6ff;
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 16px;
}

header button:hover {
  background: #2f89e0;
}


#map {
  width: min(1200px, 78.5vw);
  height: min(600px, 86.5vh);
  border: 1px solid black;
  margin: 15px auto;
  position: relative;
}


.leaflet-control-attribution {
  display:none !important;
}



#routeMenu {

  position:absolute;

  bottom:10px;

  right:10px;


  background:rgba(255,255,255,0.9);


  padding:10px;


  border-radius:6px;


  z-index:1000;


  display:flex;

  flex-direction:column;


  max-height:350px;


  overflow:hidden;


  font-size:14px;

}



#routeList {

  overflow-y:auto;

  overflow-x:hidden;

  max-height:285px;

}



#menuBottom {

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-top:5px;

}



#speedControl {

  display:flex;

  align-items:center;

  gap:5px;

  padding-top:0;

  margin-top:0;

}



#routeMenu label {

  display:block;

  width:100%;

  margin-bottom:6px;

  cursor:pointer;

  user-select:none;

  white-space:nowrap;

}



#routeMenu span {

  cursor:pointer;

  color:#0056b3;

}



#routeMenu span:hover {

  color:#003d80;

  text-decoration:underline;

}



.playButton {

  margin-left:8px;

  cursor:pointer;

  color:#008000;

  font-weight:bold;

}



.playButton:hover {

  color:#004d00;

  text-decoration:underline;

}



#minimizeButton {

  width:22px;

  height:22px;

  padding:0;

  background:#ddd;

  border:1px solid #999;

  border-radius:3px;

  cursor:pointer;

  font-size:16px;

  line-height:15px;

  text-align:center;

  flex-shrink:0;

}	

#routeMenu.minimized {

  padding:10px;

  background:transparent;

  border-radius:6px;

  max-height:none;

}


#routeMenu.minimized #menuBottom {

  margin:0;

}


#routeMenu.minimized #minimizeButton {

  margin:0;

}



#routeMenu.minimized #menuBottom {

  margin:0;

}



#routeMenu.minimized #minimizeButton {

  display:block;

}

#minimizeButton:hover {

  background:#bbb;

}



#routeMenu.minimized #routeList,
#routeMenu.minimized #speedControl {

  display:none;

}



@media (max-width:600px){

header {

  justify-content:center;

  padding:10px;

}


header button {

  font-size:14px;

  padding:8px 12px;

}


#map {

  width:95vw;

  height:70vh;

}


#routeMenu {

  max-width:80vw;

  font-size:13px;

}

}

</style>
</head>


<body>


<header>

<a href="index.html"><button>Home</button></a>

<a href="matsuya.html"><button>Matsuya</button></a>

<a href="concerts.html"><button>Concerts</button></a>

<a href="journeymap.html"><button>JourneyMap</button></a>

</header>



<div id="map">


<div id="routeMenu">


<div id="routeList"></div>


<div id="menuBottom">


<div id="speedControl"></div>


<button id="minimizeButton">▼</button>


</div>


</div>


</div>



<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>


<script>
const map = L.map('map',{
    preferCanvas:true
}).setView(
  [36.2048,138.2529],
  5
);


L.tileLayer(
'https://{s}.tile.thunderforest.com/neighbourhood/{z}/{x}/{y}.png?apikey=db5ae1f5778a448ca662554581f283c5',
{
 attribution:'&copy; OpenStreetMap contributors &copy; Thunderforest'
}
).addTo(map);



// GPX ROUTES

const routes = [

{
 name:"To_Sunset_Hill",
 file:"To_Sunset_Hill.gpx",
 color:"#cc6600"
},

{
 name:"Apr_12_2026_2_12_54_PM_spring",
 file:"Apr_12,_2026_2_12_54_PM_spring.gpx",
 color:"#ff0000"
},

{
 name:"Feb_13_2026_5_42_33_AM_4_concerts_and_cherry_blossom",
 file:"Feb_13,_2026_5_42_33_AM_4_concerts_and_cherry_blossom.gpx",
 color:"#009900"
},

{
 name:"Nov_28_2025_7_51_40_AM_autumn_with_family",
 file:"Nov_28,_2025_7_51_40_AM_autumn_with_family.gpx",
 color:"#0066ff"
},

{
 name:"Oct_24_2024_10_08_50_PM",
 file:"Oct_24,_2024_10_08_50_PM.gpx",
 color:"#9900ff"
},

{
 name:"Oct_3_2024_11_14_45_PM_kyoto_nagasaki",
 file:"Oct_3,_2024_11_14_45_PM_kyoto_nagasaki.gpx",
 color:"#ff6600"
},

{
 name:"Oct_3_2024_11_14_45_PM",
 file:"Oct_3,_2024_11_14_45_PM.gpx",
 color:"#cc0000"
},

{
 name:"Sep_23_2024_4_10_18_PM_kawasaki_tire_park",
 file:"Sep_23,_2024_4_10_18_PM_kawasaki_tire_park.gpx",
 color:"#00aaaa"
},

{
 name:"Aug_15_2024_5_24_27_PM_from_nakano",
 file:"Aug_15,_2024_5_24_27_PM_from_nakano.gpx",
 color:"#aaaa00"
},

{
 name:"Aug_2_2024_10_19_58_PM_with_kei_yong_to_pachinko_parking_lot",
 file:"Aug_2,_2024_10_19_58_PM_with_kei_yong_to_pachinko_parking_lot.gpx",
 color:"#0088ff"
},

{
 name:"Aug_1_2024_6_36_17_PM_after_sushiro_walking_home",
 file:"Aug_1,_2024_6_36_17_PM_after_sushiro_walking_home.gpx",
 color:"#ff0088"
},

{
 name:"May_12_2024_5_36_50_AM_center_w_harry",
 file:"May_12,_2024_5_36_50_AM_center_w_harry.gpx",
 color:"#00aa44"
},

{
 name:"May_11_2024_9_51_45_PM_walk_with_alex_hiyoshi_honcho",
 file:"May_11,_2024_9_51_45_PM_walk_with_alex_hiyoshi_honcho.gpx",
 color:"#4444ff"
},

{
 name:"Mar_16_2024_10_07_35_AM_shimanami_kaido_biking",
 file:"Mar_16,_2024_10_07_35_AM_shimanami_kaido_biking.gpx",
 color:"#ff4444"
},

{
 name:"Feb_15_2024_9_28_51_AM_end_of_tsurumi_w_noah",
 file:"Feb_15,_2024_9_28_51_AM_end_of_tsurumi_w_noah.gpx",
 color:"#6600cc"
},

{
 name:"Jan_14_2024_8_48_14_AM_sfc_biking_w_ale_x",
 file:"Jan_14,_2024_8_48_14_AM_sfc_biking_w_ale_x.gpx",
 color:"#aa44aa"
},

{
 name:"Jan_8_2024_11_12_10_AM_suwa",
 file:"Jan_8,_2024_11_12_10_AM_suwa.gpx",
 color:"#ffaa00"
},

{
 name:"Jan_4_2024_8_15_58_AM_kamakura",
 file:"Jan_4,_2024_8_15_58_AM_kamakura.gpx",
 color:"#44aa44"
},

{
 name:"Dec_29_2023_5_19_43_PM_from_ski",
 file:"Dec_29,_2023_5_19_43_PM_from_ski.gpx",
 color:"#006666"
},

{
 name:"Dec_24_2023_10_28_36_AM_to_hiyoshi_honcho_bookoff",
 file:"Dec_24,_2023_10_28_36_AM_to_hiyoshi_honcho_bookoff.gpx",
 color:"#666600"
},

{
 name:"Nov_30_2023_5_11_10_PM_actually_2_2km_book_off_shinjuku",
 file:"Nov_30,_2023_5_11_10_PM_actually_2_2km_book_off_shinjuku.gpx",
 color:"#ff99cc"
},

{
 name:"Nov_30_2023_3_53_10_PM_missed_bus_and_bookoff",
 file:"Nov_30,_2023_3_53_10_PM_missed_bus_and_bookoff.gpx",
 color:"#009999"
},

{
 name:"Nov_29_2023_12_49_36_PM_to_center",
 file:"Nov_29,_2023_12_49_36_PM_to_center.gpx",
 color:"#9999ff"
}

];



const routeList = document.getElementById("routeList");


const routeObjects = [];



L.DomEvent.disableClickPropagation(routeMenu);

L.DomEvent.disableScrollPropagation(routeMenu);
function loadRoute(route,index,routeData){


if(routeData.layer){

    if(!map.hasLayer(routeData.layer)){
        routeData.layer.addTo(map);
    }

    return;

}



const layer = new L.GPX(route.file,{

async:true,

markers:false,

polyline_options:{
    color:route.color,
    weight:3,
    opacity:0.85,
    smoothFactor:2
},

marker_options:{

startIconUrl:null,

endIconUrl:null,

shadowUrl:null,

wptIconUrls:[]

}

});



routeData.layer = layer;



layer.bindTooltip(route.name,{

sticky:true,

direction:"top"

});



layer.on("loaded",(e)=>{



routeData.gpxLayer = e.target.getLayers().find(
    layer => typeof layer.getLatLngs === "function"
);




if(index===0){

map.fitBounds(

e.target.getBounds(),

{

padding:[40,40]

}

);

}


});



layer.addTo(map);
routeData.visible = true;


}




routes.forEach((route,index)=>{


const routeData = {


layer:null,

animationLayer:null,

animationFrame:null,

coordinates:[],

visible:false


};



routeObjects.push(routeData);





const label=document.createElement("label");



const checkbox=document.createElement("input");


checkbox.type="checkbox";


checkbox.checked=true;



const text=document.createElement("span");


text.textContent=" "+route.name;



const play=document.createElement("span");


play.className="playButton";


play.textContent=" [Play]";



label.appendChild(checkbox);

label.appendChild(text);

label.appendChild(play);



routeList.appendChild(label);





text.addEventListener("click",(e)=>{


e.stopPropagation();



if(routeData.layer && routeData.layer.getBounds().isValid()){


map.fitBounds(

routeData.layer.getBounds(),

{

padding:[40,40]

}

);


}



});





checkbox.addEventListener("change",()=>{


if(checkbox.checked){


loadRoute(
route,
index,
routeData
);


routeData.visible=true;


}



else{


if(routeData.layer){


map.removeLayer(
routeData.layer
);


}



routeData.visible=false;



if(routeData.animationFrame){


cancelAnimationFrame(
routeData.animationFrame
);


routeData.animationFrame=null;


}



if(routeData.animationLayer){


map.removeLayer(
routeData.animationLayer
);


routeData.animationLayer=null;


}


}


});






play.addEventListener("click",(e)=>{


e.preventDefault();

e.stopPropagation();




if(!routeData.coordinates ||
routeData.coordinates.length < 2){


if(!routeData.layer){


loadRoute(
route,
index,
routeData
);


}



alert(
"Route is loading. Press Play again in a few seconds."
);


return;


}





if(routeData.layer &&
routeData.layer.getBounds().isValid()){


map.fitBounds(

routeData.layer.getBounds(),

{

padding:[40,40]

}

);


}



if(!checkbox.checked){


checkbox.checked=true;

routeData.visible=true;


}




if(routeData.layer){


map.removeLayer(
routeData.layer
);


}



animateRoute(
routeData,
route
);



});



});





// Load all routes once, keep them visible

let loadedCount = 0;

routes.forEach((route,index)=>{

    const routeData = routeObjects[index];

    loadRoute(route,index,routeData);

});
const speedLabel = document.createElement("div");

speedLabel.innerHTML = `
Play Route in:
<input
id="animationSpeed"
type="number"
value="5"
min="1"
max="300"
style="width:50px;"
>
Seconds
`;


speedControl.appendChild(speedLabel);



const speedInput =
document.getElementById("animationSpeed");



speedInput.addEventListener("input",()=>{


if(speedInput.value < 1){

speedInput.value=1;

}


if(speedInput.value > 300){

speedInput.value=300;

}


speedInput.value =
Math.floor(speedInput.value);


});





// Minimize / expand menu

const minimizeButton =
document.getElementById("minimizeButton");



minimizeButton.addEventListener("click",()=>{


routeMenu.classList.toggle("minimized");



if(routeMenu.classList.contains("minimized")){


minimizeButton.textContent="▲";


}

else{


minimizeButton.textContent="▼";


}


});





// Flatten GPX multi-segment tracks into one continuous route

function flattenCoordinates(coords){


let result=[];



function recurse(arr){


arr.forEach(item=>{


if(Array.isArray(item)){


recurse(item);


}

else if(item && item.lat && item.lng){


result.push(item);


}


});


}



recurse(coords);



return result;


}





function animateRoute(routeData,route){



if(routeData.animationLayer){


map.removeLayer(
routeData.animationLayer
);


}



if(routeData.animationFrame){


cancelAnimationFrame(
routeData.animationFrame
);


}




const animatedLine =
L.polyline([],

{

color:route.color,

weight:3,

opacity:0.85,

smoothFactor:2

}

).addTo(map);




animatedLine.bindTooltip(route.name,{

sticky:true,

direction:"top"

});



routeData.animationLayer =
animatedLine;




const points =
routeData.coordinates;



const duration =
Number(speedInput.value) * 1000;



let startTime=null;




function animate(timestamp){



if(!startTime){


startTime=timestamp;


}




const progress=Math.min(

(timestamp-startTime)/duration,

1

);





const index=Math.floor(

progress*(points.length-1)

);





animatedLine.setLatLngs(

points.slice(
0,
index+1
)

);





if(progress<1){


routeData.animationFrame =
requestAnimationFrame(animate);


}

else{


routeData.animationFrame=null;


}



}





routeData.animationFrame =
requestAnimationFrame(animate);



}





routeMenu.addEventListener(

"mousedown",

function(e){

e.stopPropagation();

}

);





window.addEventListener("resize",()=>{


map.invalidateSize();


});


</script>


</body>

</html>
