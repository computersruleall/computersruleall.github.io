<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Routes</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: white;
    }

    header {
      background: #333;
      padding: 10px 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    header a {
      text-decoration: none;
    }

    header button {
      background: #4da6ff;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    header button:hover {
      background: #2f89e0;
    }

    #map {
      width: 1200px;
      height: 600px;
      border: 1px solid black;
      margin: 30px auto;
      position: relative;
    }

    .leaflet-control-attribution {
      display: none !important;
    }

    #routeMenu {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(255,255,255,0.9);
      padding: 10px;
      border-radius: 6px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      max-height: 350px;
      overflow-y: auto;
      font-size: 14px;
    }

    #routeMenu label {
      margin-bottom: 6px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    #routeMenu span {
      cursor: pointer;
      color: #0056b3;
    }

    #routeMenu span:hover {
      color: #003d80;
      text-decoration: underline;
    }
  </style>
</head>

<body>

<header>
  <a href="index.html"><button>Home</button></a>
  <a href="matsuya.html"><button>Matsuya</button></a>
  <a href="concerts.html"><button>Concerts</button></a>
  <a href="journeymap.html"><button>JourneyMap</button></a>
</header>

<div id="map">
  <div id="routeMenu"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

<script>

const map = L.map('map').setView([36.2048, 138.2529], 5);

L.tileLayer(
  'https://{s}.tile.thunderforest.com/neighbourhood/{z}/{x}/{y}.png?apikey=db5ae1f5778a448ca662554581f283c5',
  {
    attribution: '&copy; OpenStreetMap contributors &copy; Thunderforest'
  }
).addTo(map);

// Add your GPX routes here.
const routes = [
  {
    name: "Tsurumi",
    file: "tsurumi.gpx",
    color: "#ff0000"
  },
  {
    name: "Filler1",
    file: "gpx/mt-takao.gpx",
    color: "#009900"
  },
  {
    name: "Filler2",
    file: "gpx/lake-suwa.gpx",
    color: "#0066ff"
  }
];

const layers = [];
const routeMenu = document.getElementById("routeMenu");

L.DomEvent.disableClickPropagation(routeMenu);
L.DomEvent.disableScrollPropagation(routeMenu);
routes.forEach((route, index) => {

  // Load GPX
  const layer = new L.GPX(route.file, {
    async: true,

    polyline_options: {
      color: route.color,
      weight: 4,
      opacity: 0.9
    },

    marker_options: {
      startIconUrl: null,
      endIconUrl: null,
      shadowUrl: null
    }
  }).addTo(map);

  layers.push(layer);

  // Create checkbox
  const label = document.createElement("label");

  const checkbox = document.createElement("input");
  checkbox.type = "checkbox";
  checkbox.checked = true;
  checkbox.dataset.index = index;

  // Clickable route name
  const text = document.createElement("span");
  text.textContent = " " + route.name;

  label.appendChild(checkbox);
  label.appendChild(text);
  routeMenu.appendChild(label);

  // Zoom to route when its name is clicked
  text.addEventListener("click", () => {
    if (layer.getBounds().isValid()) {
      map.fitBounds(layer.getBounds(), {
        padding: [40, 40]
      });
    }
  });

  // Show/hide route
  checkbox.addEventListener("change", () => {

    if (checkbox.checked) {
      layer.addTo(map);
    } else {
      map.removeLayer(layer);
    }

  });

  // Once loaded, fit the map to the first route
  layer.on("loaded", function(e) {

    if (index === 0) {
      map.fitBounds(e.target.getBounds(), {
        padding: [40, 40]
      });
    }

  });

});
</script>

</body>
</html>
