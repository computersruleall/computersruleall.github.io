<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legendary</title>

<style>

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
}

body {
    font-family: Arial, sans-serif;
    background: white;
}

header {
    width: 100%;
    box-sizing: border-box;
    background: #333;
    padding: 10px 20px;
    display: flex;
    gap: 10px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
}

header a {
    text-decoration: none;
}

header button {
    background: #4da6ff;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
}

header button:hover {
    background: #2f89e0;
}

main {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 3vh 0;
}

main img {
    max-width: 80vw;
    max-height: 80vh;
    width: auto;
    height: auto;
}

@media (max-width:600px) {

header {
    justify-content: center;
    padding: 10px;
}

header button {
    font-size: 14px;
    padding: 8px 12px;
}

main img {
    max-width: 95vw;
    max-height: 75vh;
}

}

</style>
</head>

<body>

<header>
<a href="index.html"><button>Home</button></a>
<a href="matsuya.html"><button>Matsuya</button></a>
<a href="concerts.html"><button>Concerts</button></a>
<a href="legendary.html"><button>Legendary</button></a>
</header>

<main>
    <!--
      Use the responsive variants generated by scripts/resize_photos.py.
      srcset lets the browser pick the smallest file it can get away with:
        - thumb (~300 px, ~13 KB) covers narrow mobile at ~95vw with 1x DPR
        - med (~1200 px, ~220 KB) covers desktop and mobile with high DPR
        - original (~3.2 MB) is the fallback for very-large / very-high-DPR
          displays that actually benefit from it
      Without this, every visitor was fetching the full 3.2 MB original —
      overkill for anything smaller than a 4K monitor.
    -->
    <img
      src="med/shrineplayground.jpg"
      srcset="thumb/shrineplayground.jpg 300w,
              med/shrineplayground.jpg 1200w,
              shrineplayground.jpg 2400w"
      sizes="(max-width:600px) 95vw, 80vw"
      loading="eager"
      decoding="async"
      alt="Shrine Playground">
</main>

</body>
</html>
